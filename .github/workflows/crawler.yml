name: 游戏热点24小时监控 (TrendRadar)
# 触发规则：每30分钟自动执行 + 手动触发
on:
  schedule:
    - cron: '*/30 * * * *'  # UTC时间，对应北京时间每30分钟自动运行
  workflow_dispatch:  # 保留手动触发，方便测试

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行游戏热点监控
        env:
          # 飞书推送地址（从Secrets读取）
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # 监控平台（游戏垂直+综合平台）
          MONITOR_PLATFORMS: ${{ secrets.MONITOR_PLATFORMS }}
          # 游戏关键词
          KEYWORDS: ${{ secrets.KEYWORDS }}
          # 热度阈值（3星=中高热度，过滤低质内容）
          HOT_LEVEL: ${{ secrets.HOT_LEVEL }}
          # 推送频率（与cron定时对应）
          PUSH_FREQUENCY: ${{ secrets.PUSH_FREQUENCY }}
          # 开启AI分析与总结
          AI_ANALYSIS: ${{ secrets.AI_ANALYSIS }}
          AI_SUMMARY: ${{ secrets.AI_SUMMARY }}
          # 仅推送飞书
          PUSH_TARGETS: ${{ secrets.PUSH_TARGETS }}
          # 凌晨静默（00:00-08:00不推送，可选）
          SILENT_TIME: ${{ secrets.SILENT_TIME }}
        run: python main.py
