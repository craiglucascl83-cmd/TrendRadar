name: 游戏热点24小时监控 (TrendRadar)
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟自动执行
  workflow_dispatch:  # 手动触发
    inputs:  # 关键：添加这部分，让crawl选项显示
      crawl:
        description: '执行热点爬取与推送'
        required: true
        default: 'true'
        type: boolean

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行游戏热点监控
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          MONITOR_PLATFORMS: ${{ secrets.MONITOR_PLATFORMS }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          HOT_LEVEL: ${{ secrets.HOT_LEVEL }}
          PUSH_FREQUENCY: ${{ secrets.PUSH_FREQUENCY }}
          AI_ANALYSIS: ${{ secrets.AI_ANALYSIS }}
          AI_SUMMARY: ${{ secrets.AI_SUMMARY }}
          PUSH_TARGETS: ${{ secrets.PUSH_TARGETS }}
          SILENT_TIME: ${{ secrets.SILENT_TIME }}
        run: python main.py
